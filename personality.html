<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personality & Behavior Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', serif;
        }
        body {
            background: #0b0710;
            background-image:
                radial-gradient(circle at 20% 10%, rgba(80,20,120,0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 90%, rgba(40,10,70,0.2) 0%, transparent 45%);
            color: #d8cfe8;
            min-height: 100vh;
            padding: 30px 15px;
            line-height: 1.6;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            background: rgba(20,12,30,0.85);
            border: 1px solid #5c3b72;
            border-radius: 18px;
            padding: 40px 30px;
            box-shadow: 0 0 30px rgba(92,59,114,0.35);
        }
        .container::before {
            content: "✧ ☽ Personality Reading ☾ ✧";
            display: block;
            text-align: center;
            font-size: 20px;
            color: #a87dc2;
            letter-spacing: 6px;
            margin-bottom: 25px;
        }
        h1 {
            text-align: center;
            font-size: 28px;
            color: #e0cff2;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(35,22,50,0.7);
            border: 1px solid #4a2f61;
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 18px;
        }
        .card h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #d4bce8;
        }
        .score {
            font-size: 16px;
            color: #a87dc2;
            margin-bottom: 10px;
        }
        .desc {
            font-size: 15px;
            line-height: 1.7;
            color: #e0d0f0;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            background: linear-gradient(145deg, #6b3e8c, #472961);
            border: 1px solid #825aa8;
            border-radius: 12px;
            color: #f0e6fa;
            font-size: 16px;
            letter-spacing: 1px;
            text-align: center;
            cursor: pointer;
        }
        .btn:hover {
            background: linear-gradient(145deg, #804ea3, #5a3477);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Your Personality & Behavior</h1>

        <!-- Fire 🔥 -->
        <div class="card">
            <h2>🔥 Fire Element (Passion & Action)</h2>
            <div class="score" id="fireScore"></div>
            <div class="desc" id="fireDesc"></div>
        </div>

        <!-- Earth 🪨 -->
        <div class="card">
            <h2>🪨 Earth Element (Stability & Reality)</h2>
            <div class="score" id="earthScore"></div>
            <div class="desc" id="earthDesc"></div>
        </div>

        <!-- Air 💨 -->
        <div class="card">
            <h2>💨 Air Element (Mind & Communication)</h2>
            <div class="score" id="airScore"></div>
            <div class="desc" id="airDesc"></div>
        </div>

        <!-- Water 💧 -->
        <div class="card">
            <h2>💧 Water Element (Emotion & Intuition)</h2>
            <div class="score" id="waterScore"></div>
            <div class="desc" id="waterDesc"></div>
        </div>

        <button class="btn" onclick="location.href='guide.html'">Continue to Full Guide</button>
    </div>

    <script>
        // 自动读取之前的四元素分数
        const elm = JSON.parse(sessionStorage.getItem('elm')) || { fire:1, earth:1, air:0, water:4 };

        // 生成性格描述
        function getTrait(score, high, mid, low) {
            if (score >= 4) return high;
            if (score >= 2) return mid;
            return low;
        }

        // Fire
        document.getElementById('fireScore').innerText = `Your Score: ${elm.fire}`;
        document.getElementById('fireDesc').innerText = getTrait(
            elm.fire,
            "Confident, passionate, bold, energetic, natural leader, quick to act, motivated.",
            "Confident in some situations, cautious in others; balanced energy.",
            "Timid, low energy, lacks confidence, avoids risks, slow to take action."
        );

        // Earth
        document.getElementById('earthScore').innerText = `Your Score: ${elm.earth}`;
        document.getElementById('earthDesc').innerText = getTrait(
            elm.earth,
            "Practical, grounded, responsible, stable, patient, reliable, good with money & plans.",
            "Realistic but flexible; can plan but also adapt to changes.",
            "Unstable, careless, disorganized, easily stressed, struggles with reality."
        );

        // Air
        document.getElementById('airScore').innerText = `Your Score: ${elm.air}`;
        document.getElementById('airDesc').innerText = getTrait(
            elm.air,
            "Smart, logical, great communicator, curious, calm, clear thinking.",
            "Average thinking skills; can think clearly but sometimes confused.",
            "Easily confused, poor judgment, struggles to express thoughts, indecisive."
        );

        // Water
        document.getElementById('waterScore').innerText = `Your Score: ${elm.water}`;
        document.getElementById('waterDesc').innerText = getTrait(
            elm.water,
            "Sensitive, intuitive, empathetic, deep feelings, calm, kind, dreamy.",
            "Can feel emotions but not overwhelmed; balanced sensitivity.",
            "Cold, unfeeling, lacks empathy, overly rational, ignores intuition."
        );
    </script>
</body>
</html>
