<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星座占卜 - 神秘水晶球</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', serif;
        }

        body {
            /* 神秘暗黑背景 + 柔光渐变 */
            background: #0b0710 url('https://images.unsplash.com/photo-1534447677768-be436bb09401?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat fixed;
            background-blend-mode: overlay;
            background-color: rgba(11,7,16,0.85);
            color: #d8cfe8;
            min-height: 100vh;
            padding: 30px 15px;
            line-height: 1.6;
        }

        /* 顶部水晶球+双手容器 */
        .crystal-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 20px;
        }

        .hands {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -30%);
            width: 100%;
            height: 100%;
            background: url('https://www.pngkey.com/png/full/914-9147725_gypsy-hands-png.png') center/contain no-repeat;
            z-index: 2;
        }

        .crystal-ball {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #e8d8ff, #6b3e8c, #2a1540);
            box-shadow: 0 0 40px rgba(180,130,220,0.6),
                        inset 0 0 30px rgba(255,255,255,0.2);
            overflow: hidden;
            z-index: 3;
        }

        .constellation {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fade 24s infinite;
        }

        .constellation svg {
            width: 120px;
            height: 120px;
            fill: none;
            stroke: #f0e6fa;
            stroke-width: 1.2;
        }

        /* 12星座依次显示 */
        .constellation:nth-child(1) { animation-delay: 0s; }
        .constellation:nth-child(2) { animation-delay: 2s; }
        .constellation:nth-child(3) { animation-delay: 4s; }
        .constellation:nth-child(4) { animation-delay: 6s; }
        .constellation:nth-child(5) { animation-delay: 8s; }
        .constellation:nth-child(6) { animation-delay: 10s; }
        .constellation:nth-child(7) { animation-delay: 12s; }
        .constellation:nth-child(8) { animation-delay: 14s; }
        .constellation:nth-child(9) { animation-delay: 16s; }
        .constellation:nth-child(10) { animation-delay: 18s; }
        .constellation:nth-child(11) { animation-delay: 20s; }
        .constellation:nth-child(12) { animation-delay: 22s; }

        @keyframes fade {
            0%, 16.66%, 100% { opacity: 0; }
            2%, 14.66% { opacity: 1; }
        }

        .container {
            max-width: 680px;
            margin: 0 auto;
            background: rgba(20, 12, 30, 0.85);
            border: 1px solid #5c3b72;
            border-radius: 18px;
            padding: 35px 30px;
            box-shadow: 0 0 25px rgba(92, 59, 114, 0.35),
                        inset 0 0 15px rgba(60, 30, 90, 0.2);
            position: relative;
            z-index: 1;
        }

        .container::before {
            content: "✧ ☽ ✦ ☾ ✧";
            display: block;
            text-align: center;
            font-size: 22px;
            color: #a87dc2;
            letter-spacing: 8px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            color: #e0cff2;
            letter-spacing: 3px;
            margin-bottom: 12px;
            text-shadow: 0 0 8px rgba(180, 130, 220, 0.4);
        }

        .subtitle {
            text-align: center;
            color: #9478b0;
            font-size: 15px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: #c2a8d8;
            font-size: 14px;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 13px 16px;
            background: rgba(35, 22, 50, 0.7);
            border: 1px solid #4a2f61;
            border-radius: 10px;
            color: #e2d4f0;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #9167b3;
            box-shadow: 0 0 10px rgba(145, 103, 179, 0.3);
        }

        .btn {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            background: linear-gradient(145deg, #6b3e8c, #472961);
            border: 1px solid #825aa8;
            border-radius: 12px;
            color: #f0e6fa;
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(145deg, #804ea3, #5a3477);
            box-shadow: 0 0 12px rgba(120, 70, 160, 0.4);
        }

        footer {
            text-align: center;
            margin-top: 35px;
            font-size: 13px;
            color: #705888;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <!-- 水晶球 + 双手 -->
    <div class="crystal-wrapper">
        <div class="hands"></div>
        <div class="crystal-ball">
            <!-- 12星座SVG -->
            <div class="constellation">
                <svg viewBox="0 0 100 100"><path d="M50,10 L60,40 L90,50 L60,60 L50,90 L40,60 L10,50 L40,40 Z"/></svg>
            </div>
            <div class="constellation">
                <svg viewBox="0 0 100 100"><path d="M30,20 Q50,5 70,20 Q95,50 70,80 Q50,95 30,80 Q5,50 30,20"/></svg>
            </div>
            <div class="constellation">
                <svg viewBox="0 0 100 100"><path d="M20,30 C40,10 60,10 80,30 C95,50 95,70 80,80 C60,95 40,95 20,80 C5,70 5,50 20,30"/></svg>
            </div>
            <div class="constellation">
                <svg viewBox="0 0 100 100"><path d="M50,20 L70,50 L50,80 L30,50 Z M50,20 L50,80"/></svg>
            </div>
            <div class="constellation">
                <svg viewBox="0 0 100 100"><path d="M30,70 Q50,30 70,70 M50,30 L50,70"/></svg>
            </div>
            <div class="constellation">
                <svg viewBox="0 0 100 100"><path d="M25,25 L75,25 L75,75 L25,75 Z M25,50 L75,50 M50,25 L50,75"/></svg>
            </div>
            <div class="constellation">
                <svg viewBox="0 0 100 100"><path d="M50,15 A35,35 0 1,1 50,85 A35,35 0 1,1 50,15"/></svg>
            </div>
            <div class="constellation">
                <svg viewBox="0 0 100 100"><path d="M50,10 L80,90 M50,10 L20,90 M35,50 L65,50"/></svg>
            </div>
            <div class="constellation">
                <svg viewBox="0 0 100 100"><path d="M20,80 L50,20 L80,80 M35,50 L65,50"/></svg>
            </div>
            <div class="constellation">
                <svg viewBox="0 0 100 100"><path d="M40,20 L60,20 L75,50 L60,80 L40,80 L25,50 Z"/></svg>
            </div>
            <div class="constellation">
                <svg viewBox="0 0 100 100"><path d="M50,20 L65,40 L90,45 L70,60 L75,85 L50,70 L25,85 L30,60 L10,45 L35,40 Z"/></svg>
            </div>
            <div class="constellation">
                <svg viewBox="0 0 100 100"><path d="M30,20 L70,20 L85,50 L70,80 L30,80 L15,50 Z M50,20 L50,80"/></svg>
            </div>
        </div>
    </div>

    <div class="container">
        <h1>Elemental Astrology Divination</h1>
        <p class="subtitle">Submit your birth information for celestial reading</p>
        <div class="form-group">
            <label>Name</label>
            <input type="text" id="userName" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label>Gender</label>
            <select id="gender">
                <option value="female">Female</option>
                <option value="male">Male</option>
            </select>
        </div>
        <div class="form-group">
            <label>Birth Date (Gregorian)</label>
            <input type="date" id="birthDay" value="1983-07-10">
        </div>
        <div class="form-group">
            <label>Birth Time</label>
            <input type="time" id="birthTime" value="10:02">
        </div>
        <div class="form-group">
            <label>Birth City</label>
            <input type="text" id="birthCity" placeholder="e.g. Zhanjiang, Guangdong">
        </div>
        <button class="btn" onclick="goToResult()">Begin Divination</button>
    </div>
    <footer>
        Occult Arts • Elemental Balance • Celestial Wisdom
    </footer>

    <script>
        function goToResult() {
            const name = document.getElementById('userName').value || "Seeker";
            const gender = document.getElementById('gender').value;
            const birthDay = document.getElementById('birthDay').value;
            const birthTime = document.getElementById('birthTime').value;
            const birthCity = document.getElementById('birthCity').value;
            if (!birthDay) {
                alert("Please select your birth date first.");
                return;
            }
            const params = new URLSearchParams({
                name: name, gender: gender, bday: birthDay, btime: birthTime, city: birthCity
            });
            window.location.href = "result.html?" + params.toString();
        }
    </script>
</body>
</html>
